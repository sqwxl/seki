---
pre-commit:
  commands:
    test-go-engine:
      glob: 'go-engine/**/*.rs'
      run: cargo test -p go-engine
    test-seki-web:
      glob: 'seki-web/src/**/*.rs'
      run: cargo test -p seki-web
    test-frontend:
      glob: 'seki-web/frontend/src/**/*.{ts,tsx}'
      run: pnpm --dir seki-web/frontend test
    rustfmt:
      glob: '*.rs'
      run: cargo fmt
      stage_fixed: true
    clippy:
      glob: '*.rs'
      run: cargo clippy --all-targets -- -D warnings
    prettier:
      glob: seki-web/**/*.{mjs,ts,tsx,css}
      run: pnpm dlx prettier --write {staged_files}
      stage_fixed: true
    organize-ts-imports:
      glob: seki-web/frontend/src/**/*.{ts,tsx}
      run: pnpm --dir seki-web/frontend run organize-imports -- {staged_files}
      stage_fixed: true

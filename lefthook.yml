pre-commit:
  commands:
    rustfmt:
      glob: "*.rs"
      run: cargo fmt
      stage_fixed: true
    clippy:
      glob: "*.rs"
      run: cargo clippy --all-targets -- -D warnings
    prettier:
      glob: "seki-web/**/*.{ts,tsx,css}"
      run: prettier --write {staged_files}
      stage_fixed: true

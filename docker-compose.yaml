---
services:
  mailpit:
    image: axllent/mailpit
    ports:
      - '8025:8025'
      - '1025:1025'
  web:
    build: .
    ports: ['${PORT:-3000}:${PORT:-3000}']
    environment:
      DATABASE_URL: sqlite:///data/seki.db
      STATIC_DIR: /app/static
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@seki.local
      BASE_URL: http://localhost:${PORT:-3000}
    volumes:
      - sqlite-data:/data
    depends_on:
      mailpit:
        condition: service_started
volumes:
  sqlite-data:

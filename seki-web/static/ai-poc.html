<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seki AI Inference PoC</title>
    <style>
      body {
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        margin: 0;
        background: #f6f3eb;
        color: #1f2933;
      }

      main {
        max-width: 920px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        font-size: 28px;
        margin: 0 0 8px;
      }

      p {
        margin: 0 0 20px;
        line-height: 1.5;
      }

      .ai-poc-panel {
        display: grid;
        grid-template-columns:
          minmax(260px, 1fr) minmax(110px, 140px) minmax(140px, 160px)
          minmax(110px, 130px) minmax(90px, 110px) minmax(90px, 110px)
          minmax(130px, auto);
        gap: 12px;
        align-items: end;
        margin-bottom: 20px;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      input,
      select,
      button {
        box-sizing: border-box;
        width: 100%;
        min-height: 40px;
        border: 1px solid #c5c0b5;
        border-radius: 6px;
        background: white;
        color: #1f2933;
        font: inherit;
        padding: 8px 10px;
      }

      button {
        border-color: #1f2933;
        background: #1f2933;
        color: white;
        cursor: pointer;
        font-weight: 700;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      pre {
        overflow: auto;
        min-height: 360px;
        margin: 0;
        padding: 16px;
        border: 1px solid #c5c0b5;
        border-radius: 6px;
        background: #111827;
        color: #e5e7eb;
        font-size: 13px;
        line-height: 1.45;
      }

      @media (max-width: 780px) {
        .ai-poc-panel {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Seki AI Inference PoC</h1>
      <p>
        Worker-only inference harness for the frontend AI plan. The default
        manifest targets a local ONNX model artifact; use the synthetic manifest
        to test runtime plumbing without downloading the model.
      </p>
      <div id="ai-poc"></div>
    </main>
    <script type="module" src="/static/dist/ai-poc.js"></script>
  </body>
</html>
